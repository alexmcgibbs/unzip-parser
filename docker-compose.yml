services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unzip-parser-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhook_service
      DB_USER: webhook_user
      DB_PASSWORD: webhook_password
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    container_name: unzip-parser-postgres
    environment:
      POSTGRES_DB: webhook_service
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro

volumes:
  postgres_data: